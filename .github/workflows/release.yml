name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # tags, releases, and the CHANGELOG commit via release-please
  pull-requests: write # release-please's release PR

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  goreleaser:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # this repo's release + assets
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }} # cross-repo scoop-bucket push

  homebrew-tap:
    needs: [release-please, goreleaser]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Compute source SHA256
        id: src
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          URL="https://github.com/louisescher/hangar/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: louisescher/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Write formula
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
          SHA256: ${{ steps.src.outputs.sha256 }}
        run: |
          mkdir -p Formula
          cat > Formula/hangar.rb <<'FORMULA'
          class Hangar < Formula
            desc "A TUI package manager for AI agent skills"
            homepage "https://github.com/louisescher/hangar"
            url "https://github.com/louisescher/hangar/archive/refs/tags/GORELEASER_TAG.tar.gz"
            sha256 "GORELEASER_SHA256"
            license "MIT"

            depends_on "go" => :build

            def install
              ldflags = %W[
                -s -w
                -X github.com/louisescher/hangar/internal/cmd.version=#{version}
              ]
              system "go", "build", *std_go_args(ldflags: ldflags), "."
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/hangar version")
            end
          end
          FORMULA
          sed -i "s|GORELEASER_TAG|${TAG}|g" Formula/hangar.rb
          sed -i "s|GORELEASER_SHA256|${SHA256}|g" Formula/hangar.rb

      - name: Commit and push
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/hangar.rb
          git diff --cached --quiet || git commit -m "chore: update hangar to ${TAG}"
          git push
